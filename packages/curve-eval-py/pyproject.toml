[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "curve-eval"
version = "1.0.0"
description = "Evaluate .curve.json animation curves — supports bezier, linear, constant interpolation."
authors = [{ name = "Glen Rhodes", email = "glen@tinymoosh.com" }]
license = { text = "MIT" }
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

[tool.mypy]
strict = true
